name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install API deps
        run: |
          cd apps/api
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Import API
        run: python -c "from apps.api.app.main import app; print(app.title)"

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm install
      - name: Build web
        run: npm run build -w apps/web
